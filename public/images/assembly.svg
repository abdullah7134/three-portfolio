<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#0a0a0a"/>
  <rect x="120" y="60" width="560" height="360" rx="4" fill="#0d0d0d" stroke="#22c55e" stroke-width="1"/>
  <text x="150" y="110" fill="#22c55e" font-family="monospace" font-size="16">section .text</text>
  <text x="150" y="140" fill="#c2a4ff" font-family="monospace" font-size="14">    mov eax, 10</text>
  <text x="150" y="165" fill="#c2a4ff" font-family="monospace" font-size="14">    add eax, ebx</text>
  <text x="150" y="190" fill="#c2a4ff" font-family="monospace" font-size="14">    cmp eax, 0</text>
  <text x="150" y="215" fill="#f59e0b" font-family="monospace" font-size="14">    jg  .loop</text>
  <text x="150" y="240" fill="#c2a4ff" font-family="monospace" font-size="14">    call calculate</text>
  <text x="150" y="265" fill="#ef4444" font-family="monospace" font-size="14">    int 0x80</text>
  <text x="400" y="460" text-anchor="middle" fill="#22c55e" font-family="sans-serif" font-size="16" opacity="0.6">x86 Assembly Suite</text>
</svg>
